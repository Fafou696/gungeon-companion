<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
<title>Gungeon Companion</title>
</head>
<body>
<input type="file" id="importFile" accept="application/json" hidden>
<header>
  <h1>🔫 Gungeon Companion</h1>
  <div class="subtitle">Guide hors ligne · favoris · progression</div>
</header>

<main>
  <section class="card">
    <div class="progress-head">
      <span>Progression générale</span>
      <span id="progressText">0 %</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressBar"></div>
    </div>
    <div class="small" id="progressCount"></div>
  </section>

  <input id="search" class="search" placeholder="Rechercher une arme, un boss, un secret…">

  <div id="categories" class="chips"></div>

  <div class="section-head">
    <strong>Guide</strong>
    <span id="resultCount"></span>
  </div>

  <section id="list" class="list"></section>
</main>

<nav>
  <button onclick="setCategory('Toutes')"><b>🏠</b>Accueil</button>
  <button onclick="document.querySelector('#search').focus()"><b>🔎</b>Recherche</button>
  <button onclick="showFavorites()"><b>⭐</b>Favoris</button>
  <button onclick="exportProgress()"><b>📤</b>Exporter</button>
  <button onclick="importProgress()"><b>📥</b>Importer</button>
  <button onclick="resetAll()"><b>♻️</b>Effacer</button>
</nav>

<div class="modal" id="modal">
  <div class="sheet">
    <button class="close" onclick="closeModal()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
